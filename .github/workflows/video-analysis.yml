name: Video Analysis Worker

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  analyze:
    runs-on: [self-hosted, windows-local]
    steps:
      - name: Run video analysis worker
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          VIDEO_REPO_OWNER: Bliixkii
          VIDEO_REPO_NAME: video-analysis-pipeline
        run: |
          C:/Users/Bliixkii/AppData/Local/hermes/hermes-agent/venv/Scripts/python.exe C:/Users/Bliixkii/AppData/Local/hermes/scripts/process_video_issue.py
